<svg width="600" height="200" viewBox="0 0 600 200" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="SmartInventory logo">
  <title>SmartInventory logo</title>
  <defs>
    <linearGradient id="g1" x1="0" x2="1">
      <stop offset="0%" stop-color="#2563eb" />
      <stop offset="100%" stop-color="#06b6d4" />
    </linearGradient>
  </defs>

  <rect width="100%" height="100%" fill="none" />

  <!-- Icon: stacked boxes inside rounded square -->
  <g transform="translate(20,20)">
    <rect x="0" y="0" width="120" height="120" rx="20" fill="#0f172a" opacity="0.03" />
    <rect x="6" y="6" width="108" height="108" rx="18" fill="url(#g1)" />

    <!-- box shapes -->
    <g transform="translate(20,20)" fill="#ffffff">
      <rect x="0" y="0" width="56" height="36" rx="4" />
      <rect x="60" y="10" width="36" height="36" rx="4" />
      <rect x="28" y="46" width="56" height="36" rx="4" />
    </g>
  </g>

  <!-- Logotype -->
  <g transform="translate(160,40)">
    <text x="0" y="28" font-family="Segoe UI, Roboto, Arial, sans-serif" font-size="36" font-weight="700" fill="#0f172a">SmartInventory</text>
    <text x="0" y="56" font-family="Segoe UI, Roboto, Arial, sans-serif" font-size="14" fill="#475569">Sistem Inventaris</text>
  </g>

</svg>
