<svg width="800" height="600" viewBox="0 0 800 600" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Inventory illustration">
  <title>Inventory illustration</title>
  <rect width="100%" height="100%" fill="#f8fafc"/>

  <!-- Boxes -->
  <g transform="translate(80,120)">
    <rect x="0" y="0" width="220" height="140" rx="8" fill="#ffffff" stroke="#e6edf3"/>
    <rect x="260" y="30" width="220" height="140" rx="8" fill="#ffffff" stroke="#e6edf3"/>
    <rect x="130" y="160" width="220" height="140" rx="8" fill="#ffffff" stroke="#e6edf3"/>
  </g>

  <!-- Icons on boxes -->
  <g transform="translate(110,160)">
    <rect x="0" y="0" width="48" height="48" rx="6" fill="#0d6efd"/>
    <rect x="150" y="40" width="48" height="48" rx="6" fill="#198754"/>
    <rect x="60" y="110" width="48" height="48" rx="6" fill="#ffc107"/>
  </g>

  <!-- Magnifier -->
  <g transform="translate(520,80)">
    <circle cx="60" cy="60" r="44" fill="#fff" stroke="#dbeafe"/>
    <circle cx="60" cy="60" r="30" fill="#eef2ff"/>
    <rect x="95" y="95" width="12" height="48" rx="6" fill="#c7d2fe" transform="rotate(45 101 119)"/>
  </g>

  <!-- Title -->
  <text x="80" y="60" font-family="Arial, Helvetica, sans-serif" font-size="28" fill="#0f172a">SmartInventory</text>
  <text x="80" y="88" font-family="Arial, Helvetica, sans-serif" font-size="14" fill="#475569">Sistem inventaris sederhana</text>

</svg>
