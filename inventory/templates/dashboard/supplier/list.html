{% extends 'public/base_public.html' %}

{% block content %}
<section class="py-5">
  <div class="container">
    <div class="d-flex justify-content-between mb-3">
      <h3>Daftar Supplier</h3>
      <a href="{% url 'supplier_create' %}" class="btn btn-primary">Tambah</a>
    </div>
    <div class="card p-3">
      <ul class="list-group">
        {% for s in supplier %}
        <li class="list-group-item d-flex justify-content-between align-items-center">
          <div>
            <strong>{{ s.nama }}</strong><br>
            <small class="text-muted">{{ s.telepon }}</small>
          </div>
          <div>
            <a href="{% url 'supplier_update' s.pk %}" class="btn btn-sm btn-outline-primary">Edit</a>
            <a href="{% url 'supplier_delete' s.pk %}" class="btn btn-sm btn-outline-danger" onclick="return confirm('Hapus supplier?')">Hapus</a>
          </div>
        </li>
        {% empty %}
        <li class="list-group-item">Belum ada supplier.</li>
        {% endfor %}
      </ul>
    </div>
  </div>
</section>
{% endblock %}
